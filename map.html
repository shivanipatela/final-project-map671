<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8' />
  <title>U.S. Hog Farms</title> <!--Change this!! -->
  <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.19.1/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin:0; padding:0; }
    #map { position:absolute; top:0; bottom:0; width:100%; }
  </style>
</head>
<body>

<div id='map'></div>

  <script>
// Access token -
    mapboxgl.accessToken = 'pk.eyJ1Ijoic2hpdmFuaXBhdGVsYSIsImEiOiJjbW9oeTFsZzEwNDQ5MnBvbmtlaWN4MmgzIn0.uyYeNfb5bugWOA9YRna1kw';

    var map = new mapboxgl.Map({
      container: 'map',

      // Style -
      style: 'mapbox://styles/shivanipatela/cmoxod2do005x01ry9v2xghuu',

      // Location, XY 
      zoom: 8,
      center: [-77.93294, 34.93628]

    });


    // Add geolocate control to the map.
     map.addControl(new mapboxgl.GeolocateControl({
      positionOptions: {
        enableHighAccuracy: true
      },
      trackUserLocation: true
    }));

  </script>

</body>
